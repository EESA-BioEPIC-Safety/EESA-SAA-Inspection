<script>
const SECTIONS = [
  {
    id: "inspection_info",
    title: "Inspection Information",
    questions: [
      { id: "building", text: "Building", type: "text", required: true, placeholder: "Your answer" },
      { id: "room", text: "Room", type: "text", required: true, placeholder: "Your answer" },
      { id: "date_inspected", text: "Date Inspected", type: "date", required: true },
      { id: "inspected_by", text: "Inspected By", type: "text", required: true, placeholder: "Your answer" },
      { id: "pi_name", text: "PI's name", type: "text", required: true, placeholder: "Your answer" },
      { id: "division", text: "Division", type: "radio", required: true, options: [
        { value: "CESD", label: "Climate Ecosystem Sciences (CESD)" },
        { value: "EGD", label: "Energy Geosciences (EGD)" }
      ]}
    ]
  },
  {
    id: "checklist",
    title: "Inspection Checklist Items (SAA, Rad, Biohazard and sharps)",
    questions: [
      qRadio("q1_saa_posted", "Is the SAA posted with the LBNL approved SAA label (yellow sign) that includes the name and contact information of the person responsible for this SAA?"),
      qRadio("q2_inprogress_labeled", "Are all in-progress waste containers properly labeled with the hazardous material names, owner’s name, and accumulation start date?"),
      qRadio("q3_ready_requisition", "Are all waste containers ready for requisition properly labeled with a fully completed WMS label or Yellow RAD label for radioactive waste?"),
      qRadio("q4_waste_log", "Is an up-to-date waste log maintained, including chemical names and concentrations?"),
      qRadio("q5_rfid_removed", "Have all previous chemical RFID tags been removed from containers before they are reused for waste collection?"),
      qRadio("q6_radioactive_labeled", "Is all radioactive waste properly labeled?"),
      qRadio("q7_liquid_secondary", "Are liquids wastes stored in secondary containment?"),
      qRadio("q8_incompatible_separated", "Are incompatible wastes physically separated with different secondary containments?"),
      qRadio("q9_flammable_gt_quart", "Are all flammable wastes greater than 1 quart in volume stored in an approved flammable waste container?"),
      qRadio("q10_dated_180", "Are all waste containers dated within 6 months (180 days) of the 'SAA Accumulation Start Date'?"),
      qRadio("q11_closed_not_in_use", "Are all waste containers closed when not in use (includes ensuring ventilation attachment parts are detached from flammable waste containers when not in use)?"),
      qRadio("q12_acutely_toxic_lt1qt", "Are the acutely toxic wastes (if any) in your SAA less than 1 quart in volume?"),
      qRadio("q13_total_lt55gal", "Are all wastes in your SAA less than 55 gallons in volume total?"),
      qRadio("q14_sharps_unregulated", "Sharps containers should be labeled 'Unregulated sharps' and not be overfilled."),
      qRadio("q15_biowaste_not_overfilled", "Bio-waste containers should not be overfilled (the container should be emptied when full and the lid should be closed at all times)."),
      qRadio("q16_biohazard_labels", "Biohazard labels should be clearly posted on waste container.")
    ]
  },
  {
    id: "findings",
    title: "Findings & Corrective Actions",
    questions: [
      { id: "finding_summary", text: "Finding (If \"Needs Improvement\" was selected)", type: "textarea", placeholder: "Your answer" },
      { id: "date_corrected", text: "Date Corrected", type: "date" }
    ]
  }
];

function qRadio(id, text){
  return {
    id, text, type:"radio", required:true,
    options:[
      { value:"Satisfactory", label:"Satisfactory" },
      { value:"Not Applicable", label:"Not Applicable" },
      { value:"Needs Improvement", label:"Needs Improvement" }
    ]
  };
}

// ====== CONFIG ======
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxEx2J6wrLc_eO0BqoYtFmIt6d_0d-_TZJkvSrv9lPzOMg27OIBx8bZB70weS2LyAVdcA/exec';
const FOLDER_ID  = '1u67JzfoCXIHXoE8enJcgvBbtoP7B_esl';
// ====================

let cur = 0;
let visited = new Set([0]);
let photoStore = {};
const TOTAL = SECTIONS.length;

function init() {
  buildNavDots();
  buildSections();
  updateButtons();
  updateProgress();
  const dateEl = document.getElementById('q_date_inspected');
  if (dateEl) dateEl.valueAsDate = new Date();
}

function buildNavDots() {
  const nd = document.getElementById('navDots');
  nd.innerHTML = '';
  for (let i = 0; i < TOTAL; i++) {
    const d = document.createElement('div');
    d.className = 'nav-dot' + (i === 0 ? ' active' : '');
    d.textContent = i + 1;
    d.onclick = () => goTo(i);
    nd.appendChild(d);
  }
}

function buildSections() {
  const container = document.getElementById('appContainer');
  container.innerHTML = '';
  SECTIONS.forEach((sec, idx) => {
    const div = document.createElement('div');
    div.className = 'section' + (idx === 0 ? ' active' : '');
    div.id = 'section-' + idx;

    let html = '<div class="error-banner" id="error-' + idx + '">⚠️ Please complete the required fields highlighted below.</div>';
    html += '<h2 class="section-title">' + sec.title + '</h2>';
    sec.questions.forEach(q => html += renderQuestion(q));

    div.innerHTML = html;
    container.appendChild(div);
  });
}

function renderQuestion(q) {
  let html = '';
  switch (q.type) {
    case 'date':
      html += `<div class="card" data-qid="${q.id}" ${q.required ? 'data-required="true"' : ''}>
        <label class="q ${q.required ? 'required':''}">${q.text}</label>
        <input type="date" id="q_${q.id}">
      </div>`;
      break;

    case 'text':
      html += `<div class="card" data-qid="${q.id}" ${q.required ? 'data-required="true"' : ''}>
        <label class="q ${q.required ? 'required':''}">${q.text}</label>
        <input type="text" id="q_${q.id}" placeholder="${q.placeholder || ''}">
      </div>`;
      break;

    case 'textarea':
      html += `<div class="card" data-qid="${q.id}" ${q.required ? 'data-required="true"' : ''}>
        <label class="q ${q.required ? 'required':''}">${q.text}</label>
        <textarea id="q_${q.id}" placeholder="${q.placeholder || ''}"></textarea>
      </div>`;
      break;

    case 'radio':
      html += `<div class="card" data-qid="${q.id}" ${q.required ? 'data-required="true" data-type="radio"' : ''}>
        <label class="q ${q.required ? 'required':''}">${q.text}</label>
        <div class="radio-group">`;

      q.options.forEach(o => {
        const niToggle = (o.value === 'Needs Improvement')
          ? `onchange="toggleNeedsImprovement('${q.id}', true)"`
          : `onchange="toggleNeedsImprovement('${q.id}', false)"`;

        html += `<label>
          <input type="radio" name="q_${q.id}" value="${o.value}" ${niToggle}>
          <span>${o.label}</span>
        </label>`;
      });

      html += `</div>`;

      const pid = `preview_${q.id}_ni_photo`;
      html += `<div class="needs-improvement-wrap hidden" id="ni_wrap_${q.id}">
        <label class="q required">Please provide more information</label>
        <textarea id="q_${q.id}_ni_text" placeholder="Describe what needs improvement..."></textarea>
        <label class="q" style="margin-top:10px;">Add photo(s)</label>
        <div class="photo-upload-area" onclick="document.getElementById('q_${q.id}_ni_photo').click()">
          <div class="icon">📷</div><p>Tap to take or upload photos</p>
        </div>
        <input type="file" id="q_${q.id}_ni_photo" accept="image/*" capture="environment" multiple class="hidden" onchange="handlePhotos(this,'${pid}')">
        <div class="photo-preview-container" id="${pid}"></div>
      </div>`;

      html += `</div>`;
      break;
  }
  return html;
}

function toggleNeedsImprovement(qid, show) {
  const wrap = document.getElementById('ni_wrap_' + qid);
  if (!wrap) return;
  if (show) wrap.classList.remove('hidden');
  else wrap.classList.add('hidden');
}

function goTo(n) {
  if (n < 0 || n >= TOTAL) return;
  document.getElementById('section-' + cur).classList.remove('active');
  document.getElementById('section-' + n).classList.add('active');
  cur = n;
  visited.add(n);
  updateDots();
  updateButtons();
  updateProgress();
  window.scrollTo(0, 0);
}

function navigate(dir) {
  if (dir === 1 && cur === TOTAL - 1) { submitForm(); return; }
  goTo(cur + dir);
}

function updateDots() {
  const dots = document.querySelectorAll('.nav-dot');
  dots.forEach((d, i) => {
    d.classList.remove('active', 'visited');
    if (i === cur) d.classList.add('active');
    else if (visited.has(i)) d.classList.add('visited');
  });
}

function updateButtons() {
  const bp = document.getElementById('btnPrev');
  const bn = document.getElementById('btnNext');
  bp.style.display = cur === 0 ? 'none' : 'block';
  if (cur === TOTAL - 1) {
    bn.textContent = 'Submit ✓';
    bn.className = 'btn btn-submit';
  } else {
    bn.textContent = 'Next →';
    bn.className = 'btn btn-next';
  }
}

function updateProgress() {
  document.getElementById('progressFill').style.width = (((cur + 1) / TOTAL) * 100) + '%';
}

function handlePhotos(input, previewId) {
  const container = document.getElementById(previewId);
  if (!photoStore[previewId]) photoStore[previewId] = [];

  Array.from(input.files).forEach(file => {
    const reader = new FileReader();
    reader.onload = function (e) {
      photoStore[previewId].push({ name: file.name, data: e.target.result });

      const wrapper = document.createElement('div');
      wrapper.className = 'photo-thumb-wrapper';

      const img = document.createElement('img');
      img.className = 'photo-thumb';
      img.src = e.target.result;

      const btn = document.createElement('button');
      btn.className = 'photo-remove';
      btn.type = 'button';
      btn.textContent = '✕';
      btn.onclick = function () {
        const idx = Array.from(container.children).indexOf(wrapper);
        if (idx > -1) photoStore[previewId].splice(idx, 1);
        wrapper.remove();
      };

      wrapper.appendChild(img);
      wrapper.appendChild(btn);
      container.appendChild(wrapper);
    };
    reader.readAsDataURL(file);
  });

  input.value = '';
}

function getRadio(name) {
  const el = document.querySelector('input[name="' + name + '"]:checked');
  return el ? el.value : '';
}
function getVal(id) {
  const el = document.getElementById(id);
  return el ? el.value : '';
}

function validateRequired() {
  document.querySelectorAll('.card.error').forEach(c => c.classList.remove('error'));
  document.querySelectorAll('.error-banner.show').forEach(b => b.classList.remove('show'));

  let firstErrorSection = -1;
  let firstErrorCard = null;

  SECTIONS.forEach((sec, secIdx) => {
    let sectionHasError = false;

    sec.questions.forEach(q => {
      const missing = checkMissing(q);
      if (missing) {
        const card = document.querySelector('[data-qid="' + q.id + '"]');
        if (card) card.classList.add('error');
        sectionHasError = true;
        if (firstErrorSection === -1) {
          firstErrorSection = secIdx;
          firstErrorCard = card;
        }
      }
    });

    if (sectionHasError) {
      const banner = document.getElementById('error-' + secIdx);
      if (banner) banner.classList.add('show');
    }
  });

  if (firstErrorSection !== -1) {
    goTo(firstErrorSection);
    setTimeout(() => {
      if (firstErrorCard) firstErrorCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 350);
    return false;
  }

  return true;
}

function checkMissing(q) {
  if (!q.required) return false;

  if (q.type === 'text' || q.type === 'date' || q.type === 'textarea') {
    return !getVal('q_' + q.id);
  }

  if (q.type === 'radio') {
    const selected = getRadio('q_' + q.id);
    if (!selected) return true;
    if (selected === 'Needs Improvement') {
      const detail = getVal('q_' + q.id + '_ni_text').trim();
      if (!detail) return true;
    }
    return false;
  }

  return false;
}

function collectData() {
  const data = { timestamp: new Date().toISOString() };
  SECTIONS.forEach(sec => sec.questions.forEach(q => collectQuestionData(q, data)));
  data.photo_count = collectAllPhotos().length;
  return data;
}

function collectQuestionData(q, data) {
  switch (q.type) {
    case 'date':
    case 'text':
    case 'textarea':
      data[q.id] = getVal('q_' + q.id);
      break;
    case 'radio':
      data[q.id] = getRadio('q_' + q.id);
      data[q.id + '_ni_text'] = (data[q.id] === 'Needs Improvement') ? getVal('q_' + q.id + '_ni_text') : '';
      break;
  }
}

function collectAllPhotos() {
  const all = [];
  Object.keys(photoStore).forEach(key => {
    photoStore[key].forEach(p => {
      all.push({ section: key, name: p.name, data: p.data });
    });
  });
  return all;
}

// --------- API helper ----------
async function postJSON(payload) {
  const res = await fetch(SCRIPT_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  });

  const text = await res.text();
  let json = null;
  try { json = JSON.parse(text); } catch (e) {}

  if (!res.ok) {
    throw new Error(`HTTP ${res.status}: ${text || 'Request failed'}`);
  }
  if (!json) {
    throw new Error('Server did not return JSON. Check Apps Script doPost() response.');
  }
  if (json.ok === false) {
    throw new Error(json.error || 'Server returned an error');
  }
  return json;
}

function showLoadingMessage(msg) {
  const el = document.getElementById('loadingText');
  if (el) el.textContent = msg || '';
}

function setSubmittingState(isSubmitting) {
  const btn = document.getElementById('btnNext');
  btn.disabled = isSubmitting;
  document.getElementById('btnPrev').disabled = isSubmitting;
}
// -------------------------------

async function submitForm() {
  if (!validateRequired()) return;

  try {
    setSubmittingState(true);
    document.getElementById('loadingOverlay').classList.add('active');

    const data = collectData();
    const photos = collectAllPhotos();

    showLoadingMessage('Submitting inspection data...');
    await postJSON({
      action: 'submitForm',
      data: data
    });

    if (photos.length === 0) {
      showSuccess();
      return;
    }

    for (let i = 0; i < photos.length; i++) {
      showLoadingMessage(`Uploading photo ${i + 1} of ${photos.length}...`);
      const photo = photos[i];

      // stronger compression to reduce payload size
      const compressedData = await compressImage(photo.data, 900, 0.6);

      await postJSON({
        action: 'uploadPhotos',
        folderId: FOLDER_ID,
        inspectorName: data.inspected_by || 'Unknown',
        date: data.date_inspected || new Date().toISOString().split('T')[0],
        photos: [{
          section: photo.section,
          name: photo.name,
          data: compressedData
        }]
      });
    }

    showSuccess();

  } catch (error) {
    console.error('Submit error:', error);
    document.getElementById('loadingOverlay').classList.remove('active');
    alert('Submission failed: ' + (error.message || 'Unknown error'));
  } finally {
    setSubmittingState(false);
  }
}

function showSuccess() {
  document.getElementById('loadingOverlay').classList.remove('active');
  document.getElementById('modalOverlay').classList.add('active');
}

function compressImage(dataUrl, maxWidth, quality) {
  return new Promise(function(resolve) {
    const img = new Image();
    img.onload = function() {
      const canvas = document.createElement('canvas');
      let w = img.width, h = img.height;
      if (w > maxWidth) { h = Math.round(h * maxWidth / w); w = maxWidth; }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL('image/jpeg', quality));
    };
    img.onerror = function() { resolve(dataUrl); };
    img.src = dataUrl;
  });
}

document.addEventListener('DOMContentLoaded', init);
</script>
