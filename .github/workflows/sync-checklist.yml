name: Sync checklist from Google Sheets

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Validate secret exists
        run: |
          if [ -z "${{ secrets.SHEET_JSON_URL }}" ]; then
            echo "SHEET_JSON_URL is empty/missing"
            exit 1
          fi
          echo "Secret exists"

      - name: Fetch checklist JSON
        run: |
          curl -fL "${{ secrets.SHEET_JSON_URL }}" -o checklist.json
          echo "Downloaded bytes:"
          wc -c checklist.json
          echo "First 300 chars:"
          head -c 300 checklist.json; echo
          jq . checklist.json > /dev/null

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add checklist.json
          git diff --cached --quiet || git commit -m "Sync checklist from Google Sheets"
          git push
